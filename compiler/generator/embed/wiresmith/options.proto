// wiresmith custom field options.
//
// Import this file from any user .proto to opt into wiresmith-specific code
// shape attributes. The wiresmith CLI embeds this file and serves it from the
// canonical import path "wiresmith/options.proto", so users do not need to
// vendor it into their proto tree.
syntax = "proto2";

package wiresmith.options;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  // pointer = true emits the field as a Go pointer type:
  //   - singular `message Foo` field -> *Foo
  //   - repeated `message Foo` field -> []*Foo
  //
  // The on-wire format is unchanged. This is a compatibility shim for
  // codebases that expect protoc-gen-go / gogoproto(nullable=true) shape.
  //
  // Only valid on singular or repeated message fields. Combining with the
  // proto3 `optional` keyword is an error (optional already produces a
  // pointer). See compiler/generator/option_pointer.go for the full
  // validation list.
  optional bool pointer = 50030;

  // jsontag replaces the default `json:"..."` struct tag value on the
  // generated Go field. The value is taken verbatim — including any
  // `,omitempty` — so callers can match an existing JSON wire contract.
  //
  //   string block_id = 1 [(wiresmith.options.jsontag) = "blockID"];
  //   //  ->  BlockId string `protobuf:"..." json:"blockID"`
  //
  // The on-wire protobuf format is unchanged. Valid on every field kind
  // (scalar, message, repeated, map, oneof variant). Backticks are
  // rejected because they would terminate the surrounding raw-string
  // struct tag. See compiler/generator/option_jsontag.go.
  optional string jsontag = 50031;

  // customtype replaces the generated Go field type with a user-supplied
  // type that owns its own wire encoding.
  //
  //   bytes  label_pairs = 1 [(wiresmith.options.customtype) = "github.com/foo/bar.LabelPairs"];
  //   //  ->  LabelPairs bar.LabelPairs `protobuf:"..."`
  //
  // The user's type must implement the wiresmith CustomMarshaler interface
  // (SizeWiresmith / MarshalWiresmith / UnmarshalWiresmith / EqualWiresmith).
  // Wire format is unchanged — the field still occupies the same field number
  // and is encoded length-delimited.
  //
  // v1 scope: only valid on singular `bytes` and `string` fields (no map,
  // oneof, repeated, optional, or message fields). The value is formatted as
  // either "import/path.TypeName" (the import is registered automatically,
  // no vendoring required from the user) or just "TypeName" when the
  // user-supplied type lives in the same Go package as the generated code.
  optional string customtype = 50032;
}
