name: Buf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: buf-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  buf:
    name: Lint & Breaking
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          lint: true
          # Compare against the published BSR module, not a git ref: main
          # doesn't carry buf.yaml before this PR, so a git-ref --against
          # would misconfigure, and the published module is the actual
          # compatibility contract consumers pin against.
          breaking: true
          breaking_against: buf.build/grafana/wiresmith
          format: false
          push: false
          pr_comment: false
