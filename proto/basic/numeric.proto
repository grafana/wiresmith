syntax = "proto3";

package basic.numeric.v1;

option go_package = "wiresmith/gen/basic/numeric/v1";

// Unpacked repeated scalars — all packable types with [packed = false].
// Exercises the non-packed wire format (individual tag+value per element).
message UnpackedScalars {
  repeated double   field_double   = 1  [packed = false];
  repeated float    field_float    = 2  [packed = false];
  repeated int32    field_int32    = 3  [packed = false];
  repeated int64    field_int64    = 4  [packed = false];
  repeated uint32   field_uint32   = 5  [packed = false];
  repeated uint64   field_uint64   = 6  [packed = false];
  repeated sint32   field_sint32   = 7  [packed = false];
  repeated sint64   field_sint64   = 8  [packed = false];
  repeated fixed32  field_fixed32  = 9  [packed = false];
  repeated fixed64  field_fixed64  = 10 [packed = false];
  repeated sfixed32 field_sfixed32 = 11 [packed = false];
  repeated sfixed64 field_sfixed64 = 12 [packed = false];
  repeated bool     field_bool     = 13 [packed = false];
}

// Mixed modifiers — regular, optional, and repeated of the same type in one message.
message MixedModifiers {
  int64           regular_int     = 1;
  optional int64  optional_int    = 2;
  repeated int64  repeated_int    = 3;
  double          regular_double  = 4;
  optional double optional_double = 5;
  repeated double repeated_double = 6;
  string          regular_string  = 7;
  optional string optional_string = 8;
  repeated string repeated_string = 9;
  bytes           regular_bytes   = 10;
  optional bytes  optional_bytes  = 11;
  repeated bytes  repeated_bytes  = 12;
}

// 70 singular fields to force fieldsPresent [2]uint64 (bitmap word boundary at 64).
message WideFields {
