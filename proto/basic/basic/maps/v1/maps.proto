syntax = "proto3";

package basic.maps.v1;

option go_package = "github.com/grafana/wiresmith/gen/basic/maps/v1";

message MapBench {
  map<string, string> string_map  = 1;
  map<int64, int64>   int_map     = 2;
  map<string, Inner>  message_map = 3;
}

message Inner {
  string name  = 1;
  int64  value = 2;
  bytes  data  = 3;
}
