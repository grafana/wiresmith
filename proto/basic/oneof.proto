syntax = "proto3";

package basic.oneof.v1;

option go_package = "github.com/grafana/wiresmith/gen/basic/oneof/v1";

enum Shape {
  SHAPE_UNSPECIFIED = 0;
  SHAPE_CIRCLE      = 1;
  SHAPE_SQUARE      = 2;
  SHAPE_TRIANGLE    = 3;
}

message Payload {
  string data   = 1;
  int64  number = 2;
}

// Two oneofs in the same message.
message MultiOneof {
  oneof primary {
    string str_val  = 1;
    int64  int_val  = 2;
    bool   bool_val = 3;
  }
  oneof secondary {
    double  dbl_val   = 4;
    bytes   bytes_val = 5;
    Payload msg_val   = 6;
  }
  string regular_field = 7;
}

// Oneof with message and enum variant types.
message OneofWithTypes {
  oneof value {
    string  str_val  = 1;
    int64   int_val  = 2;
    Payload msg_val  = 3;
    Shape   enum_val = 4;
  }
}

// Oneof alongside map, optional, and repeated fields.
message OneofPlusEverything {
  string                  name   = 1;
  repeated int64          values = 2;
  optional double         score  = 3;
  map<string, string>     labels = 4;
  oneof payload {
    string  text       = 5;
    bytes   raw        = 6;
    Payload structured = 7;
  }
}
