syntax = "proto3";

package basic.jsontag.v1;

option go_package = "wiresmith/gen/basic/jsontag/v1";

import "wiresmith/options.proto";

// Leaf is the inner message referenced by JsonTagHolder.
message Leaf {
  int64  id   = 1;
  string name = 2;
}

// JsonTagHolder exercises (wiresmith.options.jsontag) across the field kinds
// the bead's acceptance criteria call out: scalar, message, repeated scalar,
// and map. A second scalar without the option is the control showing the
// option is local to the annotated field. The empty-string override
// (matching gogoproto.jsontag = "") opts a field out of JSON serialization.
message JsonTagHolder {
  // Custom name (matches Tempo's `blockID` HTTP API contract).
  string block_id = 1 [(wiresmith.options.jsontag) = "blockID"];

  // Control: no option, keeps the default `json:"plain_name,omitempty"`.
  string plain_name = 2;

  // Override with explicit ,omitempty preserved by the caller.
  uint64 total_objects = 3 [(wiresmith.options.jsontag) = "totalObjects,omitempty"];

  // Message field override.
  Leaf head = 4 [(wiresmith.options.jsontag) = "headLeaf"];

  // Repeated scalar override.
  repeated int32 sizes = 5 [(wiresmith.options.jsontag) = "sizeList"];

  // Map field override.
  map<string, int64> counters = 6 [(wiresmith.options.jsontag) = "counterMap"];

  // Empty-string override: opts the field out of JSON serialization, matching
  // gogoproto.jsontag = "" semantics.
  string internal_only = 7 [(wiresmith.options.jsontag) = ""];
}
